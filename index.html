<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
<title>家族の資産プランナー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg3);color:#1e293b;
  position:fixed;width:100%;height:100%;overflow:hidden;
}
#root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.app-header{background:var(--bg);border-bottom:.5px solid var(--bdr);position:sticky;top:0;z-index:10;}
.app-content{display:contents}
:root{
  --bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --txt:#1e293b;--txt2:#64748b;--txt3:#94a3b8;
  --bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.14);
  --ok-bg:#eaf3de;--ok-txt:#3b6d11;--ok-bdr:#c0dd97;
  --wn-bg:#faeeda;--wn-txt:#854f0b;--wn-bdr:#fac775;
  --ng-bg:#fcebeb;--ng-txt:#a32d2d;--ng-bdr:#f09595;
}
@media(prefers-color-scheme:dark){
  body{color:#e2e8f0}
  :root{
    --bg:#1e293b;--bg2:#263549;--bg3:#0f172a;
    --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
    --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
    --ok-bg:#173404;--ok-txt:#c0dd97;--ok-bdr:#3b6d11;
    --wn-bg:#412402;--wn-txt:#fac775;--wn-bdr:#854f0b;
    --ng-bg:#501313;--ng-txt:#f09595;--ng-bdr:#a32d2d;
  }
}
input:focus,select:focus{outline:2px solid #378ADD;outline-offset:1px;box-shadow:0 0 0 4px rgba(55,138,221,.10)}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer}button:active{transform:scale(.97)}
select{outline:none}
select:focus{outline:2px solid #378ADD;outline-offset:1px;box-shadow:0 0 0 4px rgba(55,138,221,.10)}
.fade{animation:fd .18s ease}
@keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

/* ── カード ── */
.card{background:var(--bg);border:.5px solid var(--bdr);border-radius:14px;padding:18px 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stitle{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

/* ── NF入力 ── */
.nf{margin-bottom:10px}
.nf label{font-size:12px;font-weight:500;color:var(--txt2)}
.nf .nf-note{font-size:10px;color:var(--txt3);font-weight:400}
.nf .row{display:flex;align-items:center;gap:8px}
.nf input{width:90px;height:36px;padding:0 10px;border-radius:8px;border:1.5px solid var(--bdr2);background:var(--bg2);font-size:16px;font-weight:500;color:var(--txt);text-align:right;transition:border-color .15s,box-shadow .15s;}
.nf input:focus{border-color:#378ADD;background:var(--bg)}
.nf input.ro{background:var(--bg2);color:var(--txt2)}
.nf .un{font-size:13px;font-weight:400;color:var(--txt3);white-space:nowrap}
.nf-btn{display:none}

/* ── テーブル内インライン入力 ── */
.tbl-in{height:36px;border-radius:8px;border:1.5px solid var(--bdr2);background:var(--bg2);color:var(--txt);font-size:16px;padding:0 8px;transition:border-color .15s,box-shadow .15s;}
.tbl-in:focus{border-color:#378ADD;background:var(--bg);box-shadow:0 0 0 3px rgba(55,138,221,.10);outline:none}
.tbl-in.center{text-align:center}
.tbl-in.right{text-align:right}

/* ── セクションヘッダー（Notion式） ── */
.sec-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:16px;margin-top:4px;}
.sec-num{display:none}
.sec-ttl{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.sec-sub{font-size:12px;color:var(--txt3);font-weight:400}

/* ── 入力行（range-row） ── */
.range-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--bdr);transition:background .1s;}
.range-row:last-of-type{border-bottom:none}
.range-row:focus-within{background:rgba(55,138,221,.03);border-radius:8px;padding-left:8px;padding-right:8px}
.range-lbl{font-size:10px;color:var(--txt3);font-weight:500;margin-bottom:3px;white-space:nowrap}
.range-sep{font-size:13px;color:var(--txt3);flex-shrink:0;padding-top:18px}
.range-del{border:none;background:transparent;color:var(--txt3);font-size:16px;flex-shrink:0;padding:4px;border-radius:6px;transition:color .12s,background .12s;opacity:.5;}
.range-del:hover{color:var(--ng-txt);background:var(--ng-bg);opacity:1}
.range-del:disabled{opacity:.2;cursor:default}
.range-del:disabled:hover{color:var(--txt3);background:transparent}
.add-btn{font-size:12px;padding:8px 0;border-radius:0;border:none;border-top:.5px dashed var(--bdr2);background:transparent;color:var(--txt3);cursor:pointer;width:100%;margin-top:4px;transition:color .12s;text-align:left;}
.add-btn:hover{color:#378ADD}

/* ── タブ ── */
.tab-scroll{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tabBtn{padding:6px 12px;border-radius:8px;border:none;font-size:13px;transition:background .12s,color .12s;white-space:nowrap;flex-shrink:0;background:transparent;}
.kv{background:var(--bg2);border-radius:8px;padding:8px 10px}
.kl{font-size:10px;color:var(--txt3);margin-bottom:2px}
.kv2{font-size:14px;font-weight:500;color:var(--txt)}
.kv2.red{color:var(--ng-txt)}
.metaCard{background:var(--bg);border:.5px solid var(--bdr);border-radius:14px;padding:16px 18px}
.ml{font-size:11px;color:var(--txt2);margin-bottom:3px}
.mv{font-size:24px;font-weight:700;color:var(--txt)}
.ms{font-size:13px;color:var(--txt2);font-weight:400}
.mn{font-size:11px;color:var(--txt3);margin-top:2px}
.eduItem{background:var(--bg2);border-radius:7px;padding:7px 9px}
.el{font-size:9px;color:var(--txt3);margin-bottom:2px}
input,select,textarea{font-size:16px!important}
.nf input{font-size:16px}
.tbl-in{font-size:16px}
.eduItem input,.actualItem input{font-size:16px!important}
.actualItem{background:var(--bg2);border-radius:8px;padding:10px 11px}
.al{font-size:11px;color:var(--txt3);margin-bottom:5px}
.actualItem input{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--txt);padding:0;outline:none}
.investBlock{background:var(--bg2);border:.5px solid var(--bdr);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(55,138,221,.12);color:#185fa5;font-weight:500}

/* ── 診断レポート ── */
.diag-wrap{border-radius:12px;overflow:hidden;border:.5px solid var(--bdr);margin-bottom:12px}
.diag-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;background:var(--bg);transition:background .1s;}
.diag-header:active{background:var(--bg2)}
.diag-title{font-size:13px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.diag-body{background:var(--bg);padding:0 16px 16px}
.diag-item{border-radius:10px;padding:12px 14px;margin-top:8px}
.diag-item.ok{background:var(--ok-bg);border:.5px solid var(--ok-bdr)}
.diag-item.wn{background:var(--wn-bg);border:.5px solid var(--wn-bdr)}
.diag-item.ng{background:var(--ng-bg);border:.5px solid var(--ng-bdr)}
.diag-item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.diag-item-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.diag-item-icon.ok{background:var(--ok-txt);color:var(--ok-bg)}
.diag-item-icon.wn{background:var(--wn-txt);color:var(--wn-bg)}
.diag-item-icon.ng{background:var(--ng-txt);color:var(--ng-bg)}
.diag-item-label{font-size:12px;font-weight:700}
.diag-item-label.ok{color:var(--ok-txt)}
.diag-item-label.wn{color:var(--wn-txt)}
.diag-item-label.ng{color:var(--ng-txt)}
.diag-msg{font-size:12px;color:var(--txt);line-height:1.7;margin-bottom:6px}
.diag-action{font-size:11px;font-weight:600;padding:7px 10px;border-radius:7px;line-height:1.6}
.diag-action.ok{background:rgba(99,153,34,.12);color:var(--ok-txt)}
.diag-action.wn{background:rgba(186,117,23,.12);color:var(--wn-txt)}
.diag-action.ng{background:rgba(163,45,45,.12);color:var(--ng-txt)}

.plan-bar::-webkit-scrollbar{display:none}
.plan-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:12px;font-weight:500;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s;}

.plan-chip-del{background:none;border:none;color:inherit;opacity:.5;font-size:13px;padding:0;cursor:pointer;line-height:1;flex-shrink:0;}
.plan-chip-del:hover{opacity:1}
.plan-add{padding:4px 10px;border-radius:16px;font-size:12px;border:1px dashed var(--bdr2);background:transparent;color:var(--txt3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s;}
.plan-add:hover{border-color:#378ADD;color:#378ADD}
.plan-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.plan-modal{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.plan-cmp{display:grid;gap:10px;margin-bottom:12px;}
.plan-cmp-col{background:var(--bg2);border-radius:10px;padding:12px 14px;border-left:4px solid transparent;}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  .card{padding:14px 16px}
  .tabBtn{font-size:12px;padding:5px 10px}

  .diag-msg{font-size:12px}

  th,td{padding:6px 4px!important}
  .range-row{flex-wrap:wrap;gap:6px}
  .tbl-in{height:36px;font-size:16px}
}
</style>
</head>

<script>

  {id:"nursery",      label:"保育所",        ages:[0,3],  def:30},

/* ── 公式データ based プリセット（令和5年度・施設利用料込み） ──

/* ── 教育費データ（令和5年度・施設利用料込み） ──

   大学：文科省「私立大学等の令和5年度入学者に係る学生納付金等調査」
   （授業料＋施設設備費の合計）
*/
const EDU_STAGE_COSTS={

// 出典: 総務省「家計調査」令和5年（住居費・教育費除く）
// couple = 夫婦の基礎生活費、single = 単身時の倍率、child = 子供1人あたり追加費（年齢別）
const EXPENSE_PRESETS=[
  {id:'compact',label:'節約',
   src:'総務省家計調査R5・節約世帯（住居・教育費除く）',
   couple:[{ageFrom:0,amount:18},{ageFrom:65,amount:16}],single:0.65,
   child:[{fromAge:0,toAge:6,amount:2},{fromAge:6,toAge:12,amount:3},

  {id:'standard',label:'標準',

   child:[{fromAge:0,toAge:6,amount:3},{fromAge:6,toAge:12,amount:4},
          {fromAge:12,toAge:18,amount:5},{fromAge:18,toAge:22,amount:7}]},
  {id:'comfort',label:'ゆとり',
   src:'総務省家計調査R5・上位3割世帯（住居・教育費除く）',
   couple:[{ageFrom:0,amount:28},{ageFrom:65,amount:23}],single:0.65,
   child:[{fromAge:0,toAge:6,amount:4},{fromAge:6,toAge:12,amount:5},
          {fromAge:12,toAge:18,amount:7},{fromAge:18,toAge:22,amount:9}]},
  {id:'luxury',label:'充実',
   src:'総務省家計調査R5・上位1割世帯（住居・教育費除く）',
   couple:[{ageFrom:0,amount:35},{ageFrom:65,amount:28}],single:0.65,
   child:[{fromAge:0,toAge:6,amount:5},{fromAge:6,toAge:12,amount:7},
          {fromAge:12,toAge:18,amount:9},{fromAge:18,toAge:22,amount:12}]},
];

// 家族構成と子供の年齢から年齢別の生活費レンジを自動生成
function genExpenseRanges(d,preset){
  const mult=d.hasSpouse?1:preset.single;
  const yearly=[];
  for(let age=d.myAge;age<=80;age++){
    const couple=preset.couple.reduce((acc,c)=>age>=c.ageFrom?c.amount:acc,0);
    let total=couple*mult;
    const yr=CY+(age-d.myAge);
    (d.children||[]).forEach(child=>{
      const childAge=yr-child.birthYear;
      const r=preset.child.find(r=>childAge>=r.fromAge&&childAge<r.toAge);
      if(r)total+=r.amount;
    });
    yearly.push({age,amount:Math.round(total)});
  }
  // 連続する同額の年を1つのレンジにまとめる
  const ranges=[];let curr=null;
  for(const it of yearly){
    if(!curr||curr.amount!==it.amount){
      if(curr)ranges.push(curr);
      curr={id:Date.now()+ranges.length,fromAge:it.age,toAge:it.age,amount:it.amount};
    }else curr.toAge=it.age;
  }
  if(curr)ranges.push(curr);
  return ranges;
}

  const costs={};EDU_STAGES.forEach(s=>costs[s.id]=s.def);

    nurseryStart:0,nurseryEnd:3,
    kindergartenStart:3,kindergartenEnd:6,
    graduateStart:22,graduateEnd:24,
    universityEntrance:100,graduateEntrance:50,univMonthly:0,activities:[]};
}

}

/* ── 計算 ── */
function loanCalc(price,down,years,rate){
  const P=Math.max(0,price-down)*10000;
  if(!P||!years)return 0;
  const r=rate/100/12,n=years*12;
  if(r===0)return P/n/10000;
  return(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1)/10000;
}
function childEdu(child,year){
  const age=year-child.birthYear;let t=0;
  for(const s of EDU_STAGES){
    if(s.id==="university"&&child.maxLevel==="high")break;
    if(s.id==="graduate"&&child.maxLevel!=="graduate")break;
    const a=s.id==="nursery"?(child.nurseryStart??0)
           :s.id==="kindergarten"?(child.kindergartenStart??3)
           :s.id==="graduate"?(child.graduateStart??22)
           :s.ages[0];
    const b=s.id==="nursery"?(child.nurseryEnd??3)
           :s.id==="kindergarten"?(child.kindergartenEnd??6)
           :s.id==="graduate"?(child.graduateEnd??24)
           :s.ages[1];
    if(age>=a&&age<b)t+=(child.costs||{})[s.id]||0;
    // 入学費用（入学年のみ）
    if(s.id==="university"&&age===18)t+=(child.universityEntrance||0);
    if(s.id==="graduate"&&age===(child.graduateStart??22))t+=(child.graduateEntrance||0);
  }
  // 習い事（月額×12）
  (child.activities||[]).forEach(a=>{
    const from=a.fromAge??0,to=a.toAge??18;
    if(age>=from&&age<to)t+=(a.monthly||0)*12;
  });
  // 大学下宿費（月額×12）
  if((child.univMonthly||0)>0&&child.maxLevel!=='high'){
    if(age>=18&&age<22)t+=(child.univMonthly)*12;
    if(child.maxLevel==='graduate'){
      const gs=child.graduateStart??22,ge=child.graduateEnd??24;
      if(age>=gs&&age<ge)t+=(child.univMonthly)*12;
    }
  }
  return t;
}
/* 教育費総額の内訳を計算（子供全員合計、単位：万円） */
function calcEduTotals(d){
  const t={nursery:0,kindergarten:0,elementary:0,middle:0,high:0,university:0,graduate:0,dormitory:0,activities:0};
  (d.children||[]).forEach(c=>{
    const co=c.costs||{};
    t.nursery+=(co.nursery||0)*Math.max(0,(c.nurseryEnd??3)-(c.nurseryStart??0));
    t.kindergarten+=(co.kindergarten||0)*Math.max(0,(c.kindergartenEnd??6)-(c.kindergartenStart??3));
    t.elementary+=(co.elementary||0)*6;
    t.middle+=(co.middle||0)*3;
    t.high+=(co.high||0)*3;
    if(c.maxLevel!=='high'){
      t.university+=(co.university||0)*4+(c.universityEntrance||0);
      const gradYrs=c.maxLevel==='graduate'?Math.max(0,(c.graduateEnd??24)-(c.graduateStart??22)):0;
      t.dormitory+=(c.univMonthly||0)*12*(4+gradYrs);
    }
    if(c.maxLevel==='graduate'){
      const gy=Math.max(0,(c.graduateEnd??24)-(c.graduateStart??22));
      t.graduate+=(co.graduate||0)*gy+(c.graduateEntrance||0);
    }
    t.activities+=(c.activities||[]).reduce((s,a)=>s+(a.monthly||0)*12*Math.max(0,(a.toAge??18)-(a.fromAge??0)),0);
  });
  return t;
}
function getExpense(d,age){
  const r=d.expenseRanges&&d.expenseRanges.find(r=>age>=r.fromAge&&age<=r.toAge);
  return r?r.amount:(d.monthlyExpenses||35);
}
/* 線形補間で年収（万円/月）を返す。退職後は0 */
/* ── 額面年収から手取りを計算（2024年度・国税庁/厚労省データ準拠） ──
   給与所得控除：所得税法
   所得税：5〜45%累進＋復興特別所得税2.1%
   住民税：所得割10%＋均等割5,000円（基礎控除43万）
   社会保険料：健康保険4.99%＋厚生年金9.15%＋雇用保険0.6%＝14.74%
*/
function grossToNet(annualGrossManYen){
  const gross = (annualGrossManYen||0) * 10000; // 円
  if(gross<=0) return 0;

  // 社会保険料
  const social = gross * 0.1474;

  // 給与所得控除
  let salaryDeduction;
  if(gross<=1625000)      salaryDeduction = 550000;
  else if(gross<=1800000) salaryDeduction = gross*0.4 - 100000;
  else if(gross<=3600000) salaryDeduction = gross*0.3 + 80000;
  else if(gross<=6600000) salaryDeduction = gross*0.2 + 440000;
  else if(gross<=8500000) salaryDeduction = gross*0.1 + 1100000;
  else                    salaryDeduction = 1950000; // 上限195万
  const salaryIncome = gross - salaryDeduction;

  // 所得税（基礎控除48万）
  const taxableIncome = Math.max(0, salaryIncome - social - 480000);
  let incomeTax;
  if(taxableIncome<=1950000)       incomeTax = taxableIncome*0.05;
  else if(taxableIncome<=3300000)  incomeTax = taxableIncome*0.10 -   97500;
  else if(taxableIncome<=6950000)  incomeTax = taxableIncome*0.20 -  427500;
  else if(taxableIncome<=9000000)  incomeTax = taxableIncome*0.23 -  636000;
  else if(taxableIncome<=18000000) incomeTax = taxableIncome*0.33 - 1536000;
  else if(taxableIncome<=40000000) incomeTax = taxableIncome*0.40 - 2796000;
  else                             incomeTax = taxableIncome*0.45 - 4796000;
  incomeTax = Math.max(0, incomeTax) * 1.021; // 復興特別所得税

  // 住民税（基礎控除43万）
  const taxableResident = Math.max(0, salaryIncome - social - 430000);
  const residentTax = taxableResident*0.10 + 5000; // 均等割5000円

  const net = gross - social - incomeTax - residentTax;
  return Math.round(net / 10000); // 万円
}

/* ── ライフイベントを考慮した実効月収を返す（万円/月・手取り） ──
   events: [{id, type:'ikukyuu'|'part', age, years?, amount?}]
   ikukyuu: 育休期間は収入0、復帰後2年で段階回復（75%→90%）
   part: 転換年齢以降は指定額面年収から手取りを計算
*/
function getEffectiveIncome(baseMonthly, age, events){
  if(!events||!events.length) return baseMonthly;
  for(const ev of [...events].sort((a,b)=>b.age-a.age)){
    if(ev.type==='part'&&age>=ev.age){
      return grossToNet(ev.amount)/12;
    }
    if(ev.type==='ikukyuu'){
      const start=ev.age, end=ev.age+(ev.years||1);
      if(age>=start&&age<end) return 0;
      if(age>=end&&age<end+2){
        const t=(age-end)/2;
        return baseMonthly*(0.75+t*0.15);
      }
    }
  }
  return baseMonthly;
}
function interpIncome(points,age,retireAge){
  if(!points||!points.length)return 0;
  if(age>=retireAge)return 0;
  const s=[...points].sort((a,b)=>a.age-b.age);
  let annualGross;
  if(age<=s[0].age) annualGross=s[0].amount;
  else if(age>=s[s.length-1].age) annualGross=s[s.length-1].amount;
  else {
    const lo=s.filter(p=>p.age<=age).pop();
    const hi=s.find(p=>p.age>age);
    const t=(age-lo.age)/(hi.age-lo.age);
    annualGross=lo.amount+t*(hi.amount-lo.amount);
  }
  /* 額面年収（万円）→ 手取り月額（万円）に変換 */
  return grossToNet(annualGross)/12;
}
function getIncome(d,age){
  /* 旧フォーマット(incomeRanges)互換 */
  if(d.incomePoints&&d.incomePoints.length)return interpIncome(d.incomePoints,age,d.retireAge||65);
  const r=d.incomeRanges&&d.incomeRanges.find(r=>age>=r.fromAge&&age<=r.toAge);
  return r?r.amount/12:(d.monthlyIncome||0);
}
function getSpouseIncome(d,spouseAge){
  if(d.spouseIncomePoints&&d.spouseIncomePoints.length)return interpIncome(d.spouseIncomePoints,spouseAge,d.spouseRetireAge||60);
  const r=d.spouseIncomeRanges&&d.spouseIncomeRanges.find(r=>spouseAge>=r.fromAge&&spouseAge<=r.toAge);
  return r?r.amount/12:(d.spouseIncome||0);
}

function getMyAgeAtEvent(d,item){
  if(!item.person||item.person==='my') return item.personAge??item.age??d.myAge;
  if(item.person==='spouse') return d.myAge+(( item.personAge??0)-(d.spouseAge||0));
  const child=d.children.find(c=>String(c.id)===String(item.person));
  if(child) return d.myAge+(child.birthYear+(item.personAge??0)-CY);
  return item.personAge??item.age??d.myAge;
}

function project(d){
  const endY=CY+(80-d.myAge);
  const lp=loanCalc(d.propertyPrice,d.downPayment,d.loanYears,d.interestRate);
  const loanEnd=d.purchaseYear+d.loanYears;
  const totalInvM=d.invest.reduce((s,i)=>s+i.monthly,0); // 表示用合計
  let cash=(d.mySavings||0)+(d.spouseSavings||0);
  let invests=d.invest.map(i=>({...i,cur:i.balance,contributed:0,costBasis:i.balance}));
  const rows=[];
  for(let yr=CY;yr<=endY;yr++){
    const age=d.myAge+(yr-CY);
    if(yr===d.purchaseYear)cash-=d.downPayment;
    const retired=age>=d.retireAge;
    const spouseAge=d.spouseAge+(yr-CY);
    const spouseRetired=spouseAge>=d.spouseRetireAge;
    const myBaseInc=retired?0:interpIncome(d.incomePoints,age,d.retireAge||65);
    const spBaseInc=(d.hasSpouse&&!spouseRetired)?interpIncome(d.spouseIncomePoints,spouseAge,d.spouseRetireAge||60):0;
    const myInc=retired?0:getEffectiveIncome(myBaseInc,age,d.myIncomeEvents||[])*12;
    const spouseInc=(d.hasSpouse&&!spouseRetired)?getEffectiveIncome(spBaseInc,spouseAge,d.spouseIncomeEvents||[])*12:0;
    const myPensionAuto=calcPension(d.incomePoints,d.myAge,d.retireAge,d.retireAge).total;
    const spPensionAuto=calcPension(d.spouseIncomePoints,d.spouseAge||30,d.spouseRetireAge||60,d.spouseRetireAge||60).total;
    const myPension=age>=(d.retireAge)?(d.myPensionMonthly||myPensionAuto):0;
    const spousePension=(d.hasSpouse&&spouseAge>=(d.spouseRetireAge||60))?(d.spousePensionMonthly||spPensionAuto):0;
    const income=myInc+spouseInc+myPension+spousePension;
    const loan=(yr>=d.purchaseYear&&yr<loanEnd)?lp*12:0;
    const housingExtra=(yr>=d.purchaseYear)?(d.housingExtras||[]).reduce((s,e)=>s+e.monthly,0)*12:0;
    const rent=(yr<d.purchaseYear)?(d.rentMonthly||0)*12:0;
    const edu=d.children.reduce((s,c)=>s+childEdu(c,yr),0);
    // 年齢に応じた積立額（開始・終了期間を考慮）
    const invM_total=retired?0:d.invest.reduce((s,i)=>{
      if((i.investType||'monthly')==='lumpsum') return s; // 一括は月次積立なし
      const active=(!i.startAge||age>=i.startAge)&&(!i.endAge||age<=i.endAge);
      return s+(active?i.monthly:0);
    },0);
    const oneTimeIncome=(d.otherIncome||[]).filter(e=>getMyAgeAtEvent(d,e)===age).reduce((s,e)=>s+e.amount,0);
    const oneTimeExpense=(d.otherExpense||[]).filter(e=>getMyAgeAtEvent(d,e)===age).reduce((s,e)=>s+e.amount,0);
    const monthExp=getExpense(d,age);
    // 収支計算後の現金（積立前）
    // 一括投資：指定年齢に現金から一括で投資
    const lumpsumTotal=d.invest.reduce((s,i)=>{
      if((i.investType||'monthly')!=='lumpsum')return s;
      return s+(i.lumpsums||[]).filter(l=>l.age!=null&&age===l.age).reduce((a,l)=>a+(l.amount||0),0);
    },0);
    const cashBeforeInv=cash+(income-monthExp*12-loan-housingExtra-edu)+oneTimeIncome-oneTimeExpense-lumpsumTotal;
    // 現金が積立額に足りない場合は積立中止
    const invM=cashBeforeInv>=invM_total*12?invM_total:0;
    cash=cashBeforeInv-invM*12;
    // invM_total の再計算（目標残高チェックを個別に行うため資産ごとに判定）
    let invM_actual=0;
    invests=invests.map(i=>{
      const isLumpsum=(i.investType||'monthly')==='lumpsum';
      if(isLumpsum){
        const lumpAdd=(i.lumpsums||[]).filter(l=>l.age!=null&&age===l.age).reduce((a,l)=>a+(l.amount||0),0);
        return{...i,cur:i.cur*(1+i.returnRate/100)+lumpAdd,contributed:i.contributed+lumpAdd,costBasis:i.costBasis+lumpAdd};
      }
      const periodActive=(!i.startAge||age>=i.startAge)&&(!i.endAge||age<=i.endAge)&&!retired;
      const targetReached=i.targetBalance&&i.contributed>=i.targetBalance;
      const monthlyActive=periodActive&&!targetReached;
      const add=monthlyActive&&invM>0?i.monthly*12:0;
      invM_actual+=monthlyActive&&invM>0?i.monthly:0;
      return{...i,cur:i.cur*(1+i.returnRate/100)+add,contributed:i.contributed+add,costBasis:i.costBasis+add};
    });
    const totalInv=Math.round(invests.reduce((s,i)=>s+i.cur,0));
    const investSnapshot=invests.map(i=>({id:i.id,name:i.name,cur:Math.round(i.cur)}));
    let cashR=Math.round(cash);
    let drawdown=0;
    let taxOnDrawdown=0;
    // 現金がマイナスの場合、金融資産から取り崩す
    if(cashR<0&&totalInv>0){
      const needed=Math.min(-cashR,totalInv);
      // 税後手取り合計を求めるための有効額（NISA=額面、課税=税引後）
      const effectiveTotal=invests.reduce((s,i)=>{
        const gainRatio=i.cur>0?Math.max(0,(i.cur-i.costBasis)/i.cur):0;
        return s+((i.taxType||'nisa')==='nisa'?i.cur:i.cur*(1-gainRatio*0.20315));
      },0);
      const r=effectiveTotal>0?Math.min(needed/effectiveTotal,1):0;
      invests=invests.map(i=>{
        const soldAmt=i.cur*r;
        const gainRatio=i.cur>0?Math.max(0,(i.cur-i.costBasis)/i.cur):0;
        const tax=(i.taxType||'nisa')==='nisa'?0:soldAmt*gainRatio*0.20315;
        taxOnDrawdown+=tax;
        return{...i,cur:i.cur-soldAmt,costBasis:Math.max(0,i.costBasis*(1-r))};
      });
      const grossSold=totalInv*r;
      drawdown=Math.round(grossSold-taxOnDrawdown); // 手取り額
      cashR=0;
      cash=0;
    }
    taxOnDrawdown=Math.round(taxOnDrawdown);
    const totalInvAfter=Math.round(invests.reduce((s,i)=>s+i.cur,0));
    const investSnapshotFinal=invests.map(i=>({
      id:i.id,name:i.name,cur:Math.round(i.cur),
      costBasis:Math.round(i.costBasis),taxType:i.taxType||'nisa'
    }));
    /* 課税口座の含み益に対する潜在税額を計算して税引後総資産を算出 */
    const taxableLatentTax=Math.round(invests.reduce((s,i)=>{
      if((i.taxType||'nisa')!=='taxable')return s;
      const gain=Math.max(0,i.cur-i.costBasis);
      return s+gain*0.20315;
    },0));
    const totalAfterTax=cashR+totalInvAfter-taxableLatentTax;
    const incomeR=Math.round(income+oneTimeIncome);
    const expenseR=Math.round(monthExp*12+loan+housingExtra+rent+edu+invM+oneTimeExpense);
    const netR=incomeR-expenseR;
    rows.push({yr,age,label:`${age}歳`,total:cashR+totalInvAfter,totalAfterTax,cash:cashR,invest:totalInvAfter,
      investSnapshot:investSnapshotFinal,
      cashMinus:drawdown>0,drawdown:Math.round(drawdown),taxOnDrawdown,
      loan:Math.round(loan),
      income:incomeR,expense:expenseR,net:netR,edu:Math.round(edu)});
  }
  return rows;
}

/* ── 診断ロジック ── */
function diagnose(d,proj,lp){
  const householdIncome=getIncome(d,d.myAge)+(d.hasSpouse?getSpouseIncome(d,d.spouseAge||0):0);
  const housingExtrasM=(d.housingExtras||[]).reduce((s,e)=>s+e.monthly,0);
  const loanRatio=householdIncome>0?(lp+housingExtrasM)/householdIncome:0;
  const loanAmt=Math.max(0,d.propertyPrice-d.downPayment);
  const totalCost=Math.round(lp*d.loanYears*12);
  const totalInvM=d.invest.reduce((s,i)=>s+i.monthly,0);
  const mNet=householdIncome-getExpense(d,d.myAge)-lp-totalInvM;
  const last=proj[proj.length-1];
  const atRetire=proj.find(r=>r.age===d.retireAge);
  const zeroRow=proj.find(r=>r.total<0);

  /* --- 住宅診断 --- */
  let housing;
  const rPct=Math.round(loanRatio*100);
  const targetLoan=Math.floor(householdIncome*0.25*d.loanYears*12/10000)*10000;
  const neededDown=Math.max(0,d.propertyPrice-Math.round(targetLoan));
  const extraDown=neededDown-d.downPayment;

  if(loanRatio<0.25){

      action:`このまま計画を進めて問題ありません。余剰資金は金融資産への積立に回すと将来の資産形成が加速します。`
    };
  } else if(loanRatio<0.35){
    housing={
      status:'yellow',label:'住宅ローン：やや高め',
      msg:`世帯月収${householdIncome.toFixed(1)}万円に対してローン返済＋追加費用は月${(lp+housingExtrasM).toFixed(1)}万円（収入比${rPct}%）です。許容範囲内ですが、子供の教育費や急な支出が重なると家計が圧迫されます。`,
      action:`理想の25%以下に抑えるには、借入額を${Math.round(targetLoan/10000)}万円以下にするか${extraDown>0?`頭金をあと${Math.round(extraDown/10000)*10}万円増やす`:'繰り上げ返済を検討する'}ことで改善できます。`
    };
  } else {
    housing={
      status:'red',label:'住宅ローン：高負担',
      msg:`世帯月収${householdIncome.toFixed(1)}万円に対してローン返済＋追加費用は月${(lp+housingExtrasM).toFixed(1)}万円（収入比${rPct}%）です。35%を超える返済比率は、教育費・老後資金の積立が困難になるリスクがあります。`,
      action:`物件価格を${Math.round((d.propertyPrice*(rPct/25)/100)*100/100)}万円以下に見直すか、頭金をあと${Math.round((loanAmt-targetLoan)/10000)*10}万円以上増やすことを強く推奨します。`
    };
  }

  /* --- 老後診断 --- */
  let retirement;
  const finalTotal=(last?.total??0);
  const retireTotal=(atRetire?.total??0);

  if(finalTotal>=0){
    const monthlyMargin=Math.round(finalTotal/((80-d.retireAge)*12));
    retirement={
      status:'green',label:'老後資産：問題なし',
      msg:`${d.retireAge}歳の退職時に約${retireTotal.toLocaleString()}万円、80歳時には約${finalTotal.toLocaleString()}万円の資産が残る見通しです。現在の計画を継続すれば老後資金は確保できています。`,
      action:`退職後も月${monthlyMargin.toLocaleString()}万円ペースで取り崩せる計算です。インフレや想定外の医療費に備えて、資産の一部を流動性の高い形で保有しておくと安心です。`
    };
  } else if(zeroRow){
    const shortfall=Math.abs(finalTotal);
    const neededExtra=Math.round(shortfall/((d.retireAge-d.myAge)*12)*10)/10;
    retirement={
      status:'red',label:`老後資産：${zeroRow.age}歳頃に不足`,
      msg:`現在の計画では${zeroRow.age}歳頃に資産が底をつく見込みです。80歳時点では約${Math.abs(finalTotal).toLocaleString()}万円の不足が生じます。`,
      action:`今から月${neededExtra}万円追加で積み立てるか、金融資産の運用利率を0.5〜1%改善するだけで状況が大きく変わります。iDeCoやNISAの活用も有効です。`
    };
  } else {
    retirement={
      status:'red',label:'老後資産：不足の見込み',
      msg:`現在の計画では80歳時点で約${Math.abs(finalTotal).toLocaleString()}万円の不足が生じます。`,
      action:`積立額の増加または運用利率の改善を検討してください。`
    };
  }

  /* --- 月収支診断 --- */
  let monthly;
  if(mNet>0){
    const savingRate=Math.round((mNet+totalInvM)/householdIncome*100);
    monthly={
      status:'green',label:'月収支：黒字',
      msg:`毎月${mNet.toFixed(1)}万円の黒字です。うち金融資産への積立が${totalInvM.toFixed(1)}万円で、実質の貯蓄率は約${savingRate}%です。`,
      action:savingRate>=20
        ?`貯蓄率${savingRate}%は優秀な水準です。この調子で積立を継続すれば、老後資産の目標達成が視野に入ります。`
        :`貯蓄率を25%以上に引き上げると、老後資産がさらに安定します。生活費の見直しや収入アップが効果的です。`
    };
  } else {
    const deficit=Math.abs(mNet);
    monthly={
      status:'red',label:'月収支：赤字',
      msg:`毎月${deficit.toFixed(1)}万円の赤字です。このまま続くと貯蓄が減り続け、将来の資産計画に影響が出ます。`,
      action:`生活費（現在${getExpense(d,d.myAge)}万円）を${(getExpense(d,d.myAge)-deficit-0.5).toFixed(1)}万円以下に抑えるか、積立額（${totalInvM}万円）を一時的に減らして家計を安定させることを優先してください。`
    };
  }

  /* --- 総合スコア --- */
  const scores={green:0,yellow:1,red:2};
  const total=scores[housing.status]+scores[retirement.status]+scores[monthly.status];
  let overall;
  if(total===0) overall={text:'現在のプランは非常に健全です',status:'green'};
  else if(total<=2) overall={text:'概ね問題ありませんが、改善余地があります',status:'yellow'};
  else overall={text:'いくつかのリスクへの対策が必要です',status:'red'};

  return{housing,retirement,monthly,overall};
}

/* ── 収入ポイントエディタ（線形補間） ── */
/* ── 年収パターン定義 ──
   currentAge, currentAmount, retireAge から incomePoints を自動生成
*/
const INCOME_PATTERNS = [
  {
    id:'strong', label:'しっかり上昇', emoji:'🚀',
    desc:'40〜50代でピーク',
    gen:(age,amt,retire)=>{
      const peak = Math.min(retire-5, 50);
      const pts = [{id:1,age,amount:amt}];
      if(peak > age+2) pts.push({id:2,age:peak,amount:Math.round(amt*1.6)});
      pts.push({id:3,age:retire-1,amount:Math.round(amt*1.4)});
      return pts;
    }
  },
  {
    id:'moderate', label:'ゆるやかに上昇', emoji:'📈',
    desc:'安定的に少しずつ',
    gen:(age,amt,retire)=>{
      return [{id:1,age,amount:amt},{id:2,age:retire-1,amount:Math.round(amt*1.3)}];
    }
  },
  {
    id:'flat', label:'ほぼ変わらない', emoji:'➖',
    desc:'公務員・専門職など',
    gen:(age,amt,retire)=>{
      return [{id:1,age,amount:amt},{id:2,age:retire-1,amount:amt}];
    }
  },
  {
    id:'peak', label:'管理職ピーク型', emoji:'🏔️',
    desc:'役職定年で減少',
    gen:(age,amt,retire)=>{
      const peak = Math.min(retire-10, 52);
      const pts = [{id:1,age,amount:amt}];
      if(peak > age+2) pts.push({id:2,age:peak,amount:Math.round(amt*1.5)});
      pts.push({id:3,age:retire-1,amount:Math.round(amt*0.9)});
      return pts;
    }
  },
];

function IncomePointsEditor({points,retireAge,baseAge,onChange,mode,onModeChange,events,onEventsChange,selectedPattern,onPatternChange}){
  const E=React.createElement;
  const sorted=[...points].sort((a,b)=>a.age-b.age);
  const evts=events||[];
  const [addingEvent,setAddingEvent]=useState(null); // null | {type, age, amount, years}

  const addEvent=()=>{
    if(!addingEvent)return;
    const newEv={id:Date.now(),...addingEvent};
    onEventsChange([...evts,newEv]);
    setAddingEvent(null);
  };
  const removeEvent=id=>onEventsChange(evts.filter(e=>e.id!==id));

  /* ── 年収グラフ（SVG）── */
  const IncomeChartInner=React.memo(({baseVals,effectiveVals,hasEvents,ages,retireAge,evts})=>{
    const ref=useRef(null);const chartRef=useRef(null);
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    useEffect(()=>{
      if(!ref.current||typeof Chart==='undefined')return;
      if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
      const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
      const tc=isDark?'#64748b':'#94a3b8';
      Chart.Tooltip.positioners.xAxisIncome=function(items,eventPos){
        return{x:eventPos.x,y:6};
      };
      const datasets=[];
      if(hasEvents){
        datasets.push({
          label:'ベース（額面）',data:baseVals,
          borderColor:'#CBD5E1',backgroundColor:'transparent',
          borderWidth:1.5,borderDash:[4,3],pointRadius:0,pointHoverRadius:0,tension:0,fill:false,
        });
      }
      datasets.push({
        label:hasEvents?'イベント後（額面）':'年収（額面）',
        data:hasEvents?effectiveVals:baseVals,
        borderColor:'#378ADD',backgroundColor:'#378ADD18',
        borderWidth:2,pointRadius:0,pointHoverRadius:0,tension:0,fill:true,
      });
      chartRef.current=new Chart(ref.current,{
        type:'line',
        plugins:[crosshairPlugin],
        data:{labels:ages.map(a=>`${a}歳`),datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          layout:{padding:{top:44}},
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{display:hasEvents,position:'bottom',
              labels:{color:tc,font:{size:10},boxWidth:10,padding:8}},
            tooltip:{
              position:'xAxisIncome',yAlign:'top',xAlign:'center',
              backgroundColor:'rgba(20,20,20,0.85)',
              titleColor:'#fff',bodyColor:'#e2e8f0',
              titleFont:{size:12,weight:'bold'},bodyFont:{size:12},
              padding:{top:7,bottom:7,left:12,right:12},
              cornerRadius:10,displayColors:false,
              callbacks:{
                title:items=>`${items[0].label}`,
                label:ctx=>{
                  const gross=Math.round(ctx.raw);
                  const net=grossToNet(gross);
                  if(ctx.datasetIndex===0&&hasEvents)return`ベース：${gross}万円/年`;
                  return`額面 ${gross}万円  手取り約${net}万円`;
                }
              }
            }
          },
          scales:{
            x:{ticks:{color:tc,font:{size:10},maxTicksLimit:8},grid:{color:gc}},
            y:{ticks:{color:tc,font:{size:10},callback:v=>`${v}万`},grid:{color:gc},suggestedMin:0}
          },
          animation:{duration:200}
        }
      });
      return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
    },[baseVals,effectiveVals,hasEvents]);
    return React.createElement('div',{style:{height:160,position:'relative'}},
      React.createElement('canvas',{ref}));
  });

  const renderChart=()=>{
    const startAge=baseAge,endAge=Math.min(retireAge+3,80);
    const ages=[];
    for(let a=startAge;a<=endAge;a++) ages.push(a);
    const baseVals=ages.map(age=>{
      if(age>=retireAge)return 0;
      if(!sorted.length)return 0;
      if(age<=sorted[0].age)return sorted[0].amount;
      if(age>=sorted[sorted.length-1].age)return sorted[sorted.length-1].amount;
      const lo=sorted.filter(p=>p.age<=age).pop();
      const hi=sorted.find(p=>p.age>age);
      const t=(age-lo.age)/(hi.age-lo.age);
      return lo.amount+t*(hi.amount-lo.amount);
    });
    const hasEvents=evts.length>0;
    const effectiveVals=ages.map((age,i)=>{
      if(age>=retireAge)return 0;
      const baseMonthly=baseVals[i]/12;
      const effMonthly=getEffectiveIncome(baseMonthly,age,evts);
      return effMonthly*(baseMonthly>0?baseVals[i]/baseMonthly:1);
    });
    return E('div',{style:{marginBottom:14,background:'var(--bg2)',borderRadius:10,padding:'10px 12px'}},
      E('div',{style:{fontSize:10,fontWeight:600,color:'var(--txt3)',marginBottom:6}},'📊 年収カーブ（万円/年・額面）'),
      E(IncomeChartInner,{baseVals,effectiveVals,hasEvents,ages,retireAge,evts})
    );
  };

  const updPt=(id,k,v)=>onChange(points.map(p=>p.id===id?{...p,[k]:v}:p));
  const delPt=id=>onChange(points.filter(p=>p.id!==id));
  const addPt=()=>{
    const maxAge=sorted.length?sorted[sorted.length-1].age:baseAge;
    const newAge=Math.min(maxAge+5,retireAge-1);
    const newAmt=sorted.length?sorted[sorted.length-1].amount:500;
    onChange([...points,{id:Date.now(),age:newAge,amount:newAmt}]);
  };
  const preview=[];
  for(let i=0;i<sorted.length-1;i++){
    const lo=sorted[i],hi=sorted[i+1];
    const midAge=Math.round((lo.age+hi.age)/2);
    const midAmt=Math.round(lo.amount+(hi.amount-lo.amount)*(midAge-lo.age)/(hi.age-lo.age));
    preview.push({midAge,midAmt,lo,hi});
  }

  /* ── かんたんモード ── */
  const currentAmount = sorted[0]?.amount || 500;

  const renderSimple = ()=>{
    const det=grossToNetDetail(currentAmount);
    return E('div',null,

      /* ① 年収入力 */
      E('div',{style:{marginBottom:12}},
        E('div',{style:{fontSize:11,fontWeight:600,color:'var(--txt2)',marginBottom:6}},
          `💴 ${baseAge}歳・現在の年収（額面・税込み）`),
        E('div',{style:{display:'flex',alignItems:'center',gap:8}},
          E(InlineNum,{value:currentAmount,min:0,step:10,
            onChange:v=>{
              const peak=INCOME_PATTERNS.find(p=>p.id==='peak');
              onChange(peak.gen(baseAge,v,retireAge));
            },
            style:{flex:1,height:36,padding:'0 10px',borderRadius:8,
              border:'1px solid var(--bdr2)',background:'var(--bg)',
              fontSize:16,fontWeight:500,color:'var(--txt)',textAlign:'right'}}),
          E('span',{style:{fontSize:13,color:'var(--txt2)',whiteSpace:'nowrap'}},'万円/年')
        ),
        /* 手取りを1行でコンパクトに */
        currentAmount>0&&E('div',{style:{
          marginTop:6,padding:'6px 10px',borderRadius:8,
          background:'var(--bg2)',fontSize:11,color:'var(--txt2)',
          display:'flex',justifyContent:'space-between',alignItems:'center'}},
          E('span',{style:{color:'var(--txt3)'}},
            `社保 −${det.social}万　税 −${det.incomeTax+det.residentTax}万`),
          E('span',{style:{fontWeight:700,color:'var(--txt)'}},
            `手取り ${det.net}万/年`)
        )
      ),

      /* ② ライフイベント（折りたたみ） */
      E('details',{style:{marginBottom:4}},
        E('summary',{style:{
          fontSize:11,fontWeight:600,color:'var(--txt2)',
          cursor:'pointer',padding:'6px 2px',listStyle:'none',
          display:'flex',alignItems:'center',gap:6}},
          E('span',null,'🗓️ ライフイベント'),
          evts.length>0&&E('span',{style:{
            background:'#378ADD',color:'#fff',borderRadius:10,
            fontSize:10,padding:'1px 7px',fontWeight:600}},evts.length)
        ),
        E('div',{style:{marginTop:8}},
          evts.length>0&&E('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}},
            evts.map(ev=>
              E('div',{key:ev.id,style:{
                display:'flex',alignItems:'center',gap:4,
                padding:'3px 8px',borderRadius:14,fontSize:11,
                background:ev.type==='ikukyuu'?'#EFF6FF':'#F0FDF4',
                border:ev.type==='ikukyuu'?'1px solid #BFDBFE':'1px solid #BBF7D0',
                color:ev.type==='ikukyuu'?'#1D4ED8':'#15803D',
              }},
                E('span',null,ev.type==='ikukyuu'
                  ?`🤱 ${ev.age}歳〜${ev.years||1}年`
                  :`💼 ${ev.age}歳〜 ${ev.amount}万`),
                E('button',{onClick:()=>removeEvent(ev.id),
                  style:{border:'none',background:'transparent',cursor:'pointer',
                    fontSize:12,color:'inherit',opacity:.5,padding:0,lineHeight:1}
                },'×')
              )
            )
          ),
          addingEvent
            ? E('div',{style:{background:'var(--bg2)',borderRadius:10,padding:'12px 14px',border:'1px solid var(--bdr2)'}},
                /* 種別セグメント */
                E('div',{style:{display:'flex',background:'var(--bg)',borderRadius:8,padding:2,gap:2,marginBottom:10}},
                  ...[
                    {type:'ikukyuu',label:'🤱 育休・産休'},
                    {type:'part',label:'💼 パート転換'},
                  ].map(t=>
                    E('button',{key:t.type,
                      onClick:()=>setAddingEvent(a=>({...a,type:t.type})),
                      style:{flex:1,height:36,borderRadius:6,border:'none',fontSize:12,fontWeight:500,cursor:'pointer',
                        background:addingEvent.type===t.type?'var(--bg2)':'transparent',
                        color:addingEvent.type===t.type?'var(--txt)':'var(--txt3)',
                        boxShadow:addingEvent.type===t.type?'0 1px 3px rgba(0,0,0,.08)':'none'}
                    },t.label)
                  )
                ),
                /* 入力フィールド */
                E('div',{style:{display:'flex',gap:8,marginBottom:10,alignItems:'flex-end'}},
                  E('div',{style:{flex:'0 0 auto'}},
                    E('div',{style:{fontSize:10,color:'var(--txt3)',marginBottom:4}},
                      addingEvent.type==='ikukyuu'?'開始年齢':'転換年齢'),
                    E('div',{style:{display:'flex',alignItems:'center',gap:3}},
                      E(InlineNum,{value:addingEvent.age||baseAge,min:baseAge,max:retireAge-1,step:1,
                        onChange:v=>setAddingEvent(a=>({...a,age:v})),
                        style:{width:60,...tblInStyle('center')}}),
                      E('span',{style:{fontSize:11,color:'var(--txt3)'}},'歳')
                    )
                  ),
                  addingEvent.type==='ikukyuu'&&E('div',{style:{flex:'0 0 auto'}},
                    E('div',{style:{fontSize:10,color:'var(--txt3)',marginBottom:4}},'期間'),
                    E('select',{value:addingEvent.years||1,
                      onChange:e=>setAddingEvent(a=>({...a,years:parseInt(e.target.value)})),
                      style:{height:40,padding:'0 8px',borderRadius:8,border:'1px solid var(--bdr2)',
                        background:'var(--bg)',fontSize:16,color:'var(--txt)',cursor:'pointer'}},
                      E('option',{value:1},'1年'),E('option',{value:2},'2年'),E('option',{value:3},'3年')
                    )
                  ),
                  addingEvent.type==='part'&&E('div',{style:{flex:1}},
                    E('div',{style:{fontSize:10,color:'var(--txt3)',marginBottom:4}},'転換後の年収（額面）'),
                    E('div',{style:{display:'flex',alignItems:'center',gap:4}},
                      E(InlineNum,{value:addingEvent.amount||200,min:0,step:10,
                        onChange:v=>setAddingEvent(a=>({...a,amount:v})),
                        style:{flex:1,...tblInStyle('right')}}),
                      E('span',{style:{fontSize:11,color:'var(--txt3)',whiteSpace:'nowrap'}},'万/年')
                    ),
                    addingEvent.amount>0&&E('div',{style:{fontSize:10,color:'var(--txt3)',marginTop:2}},
                      `手取り約${grossToNet(addingEvent.amount)}万`)
                  )
                ),
                E('div',{style:{display:'flex',gap:6}},
                  E('button',{onClick:addEvent,
                    style:{flex:1,height:40,borderRadius:8,border:'none',
                      background:'#378ADD',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}
                  },'追加'),
                  E('button',{onClick:()=>setAddingEvent(null),
                    style:{height:40,padding:'0 14px',borderRadius:8,
                      border:'1px solid var(--bdr2)',background:'var(--bg)',
                      color:'var(--txt2)',fontSize:13,cursor:'pointer'}
                  },'キャンセル')
                )
              )
            : E('div',{style:{display:'flex',gap:6}},
                E('button',{onClick:()=>setAddingEvent({type:'ikukyuu',age:Math.min(baseAge+2,retireAge-1),years:1}),
                  style:{flex:1,height:36,borderRadius:8,border:'1.5px dashed var(--bdr2)',
                    background:'transparent',color:'var(--txt3)',fontSize:12,cursor:'pointer'}
                },'＋ 育休・産休'),
                E('button',{onClick:()=>setAddingEvent({type:'part',age:Math.min(baseAge+5,retireAge-1),amount:200}),
                  style:{flex:1,height:36,borderRadius:8,border:'1.5px dashed var(--bdr2)',
                    background:'transparent',color:'var(--txt3)',fontSize:12,cursor:'pointer'}
                },'＋ パート転換')
              )
        )
      )
    );
  };

  /* ── 詳細モード ── */
  const renderDetail = ()=>E('div',null,
    sorted.map((pt,i)=>
      [
      E('div',{key:pt.id,style:{
        display:'flex',alignItems:'center',gap:8,
        background:'var(--bg2)',borderRadius:preview[i]?'10px 10px 0 0':'10px',padding:'10px 12px',
        marginBottom:preview[i]?0:8,
      }},
        E('div',{style:{flex:'0 0 auto'}},
          E('div',{className:'range-lbl'},'年齢'),
          E('div',{style:{display:'flex',alignItems:'center',gap:4}},
            E(InlineNum,{value:pt.age,min:baseAge,max:retireAge-1,step:1,
              onChange:v=>updPt(pt.id,'age',v),
              style:{width:52,...tblInStyle('center')}}),
            E('span',{style:{fontSize:11,color:'var(--txt3)'}},'歳')
          )
        ),
        E('div',{style:{flex:1}},
          E('div',{className:'range-lbl'},'年収（額面）'),
          E('div',{style:{display:'flex',alignItems:'center',gap:4}},
            E(InlineNum,{value:pt.amount,min:0,step:10,
              onChange:v=>updPt(pt.id,'amount',v),
              style:{flex:1,...tblInStyle('right')}}),
            E('span',{style:{fontSize:11,color:'var(--txt3)',whiteSpace:'nowrap'}},'万円/年')
          )
        ),
        E('div',{style:{flex:'0 0 auto',paddingTop:18,textAlign:'right'}},
          E('span',{style:{fontSize:11,color:'var(--txt3)',background:'var(--bg)',
            borderRadius:6,padding:'3px 7px',border:'1px solid var(--bdr)',whiteSpace:'nowrap'}},
            `手取り${grossToNet(pt.amount)}万`)
        ),
        E('button',{
          onClick:()=>delPt(pt.id),
          disabled:points.length<=1,
          className:'range-del',style:{paddingTop:18}
        },'×')
      ),
      preview[i]&&E('div',{key:pt.id+'-arr',style:{
        display:'flex',alignItems:'center',gap:8,
        background:'var(--bg2)',borderTop:'.5px dashed var(--bdr)',
        padding:'6px 12px 6px 14px',marginBottom:8,
        borderRadius:'0 0 10px 10px',
      }},
        E('span',{style:{fontSize:11,color:'#378ADD',marginRight:4}},'↕'),
        E('span',{style:{fontSize:11,color:'var(--txt3)'}},
          `線形補間：${preview[i].midAge}歳ごろ `),
        E('span',{style:{fontSize:12,fontWeight:600,color:'var(--txt)'}},
          `約${preview[i].midAmt}万円/年`)
      )
      ]
    ),
    E('div',{style:{
      display:'flex',alignItems:'center',gap:6,
      background:'var(--bg2)',borderRadius:10,padding:'8px 12px',
      marginBottom:8,opacity:.6
    }},
      E('span',{style:{fontSize:11,color:'var(--txt3)'}},'🔒'),
      E('span',{style:{fontSize:12,fontWeight:600,color:'var(--txt3)'}},
        `${retireAge}歳〜　0万円（退職）`)
    ),
    E('button',{onClick:addPt,className:'add-btn'},'＋ ポイントを追加')
  );

  return E('div',null,
    /* 年収グラフ */
    sorted.length>0&&renderChart(),
    /* モード切替タブ */

/* ── 年金自動計算（厚労省計算式） ──
   国民年金：816,000円/年（2024年度満額）× 加入月数÷480
   厚生年金：平均標準報酬額 × 5.481/1000 × 加入月数
   繰上げ：1ヶ月あたり0.4%減額（2022.4以降）
   繰下げ：1ヶ月あたり0.7%増額
   ※手取り→額面の変換係数：約1.25（概算）
*/
function calcPension(incomePoints, currentAge, retireAge, pensionAge=65, startWorkAge=22){
  const KOKUMIN_FULL = 81.6; // 万円/年（2024年度）
  const KOUSEI_RATE  = 5.481 / 1000;
  const TAKOTE_TO_GAKUMEN = 1.0; // incomePointsはすでに額面ベース

  const kousei_months = Math.max(0, (retireAge - Math.max(startWorkAge, 20))) * 12;
  const kokumin_months = Math.min(480, Math.max(0, (Math.min(retireAge,60) - 20)) * 12);

  const sorted = [...(incomePoints||[])].sort((a,b)=>a.age-b.age);
  let totalIncome = 0, totalYears = 0;
  for(let age = Math.max(startWorkAge,20); age < retireAge; age++){
    let monthly = 0;
    if(sorted.length===0){ monthly=0; }
    else if(age<=sorted[0].age){ monthly=sorted[0].amount/12; }
    else if(age>=sorted[sorted.length-1].age){ monthly=sorted[sorted.length-1].amount/12; }
    else {
      const lo=sorted.filter(p=>p.age<=age).pop();
      const hi=sorted.find(p=>p.age>age);
      const t=(age-lo.age)/(hi.age-lo.age);
      monthly=(lo.amount+t*(hi.amount-lo.amount))/12;
    }
    totalIncome += monthly * TAKOTE_TO_GAKUMEN;
    totalYears++;
  }
  const avgMonthlyGakumen = totalYears>0 ? totalIncome/totalYears : 0;

  // 65歳基準の年額
  const kousei_base  = Math.round(avgMonthlyGakumen * 10000 * KOUSEI_RATE * kousei_months / 10000);
  const kokumin_base = Math.round(KOKUMIN_FULL * kokumin_months / 480);

  // 繰上げ・繰下げ調整
  let adjustment = 1.0;
  let adjLabel = '基準（65歳）';
  const pAge = Math.max(60, Math.min(75, pensionAge||65));
  if(pAge < 65){
    const months = (65 - pAge) * 12;
    adjustment = 1 - months * 0.004; // 1ヶ月0.4%減
    adjLabel = `繰上げ${65-pAge}年（${Math.round((1-adjustment)*100)}%減額）`;
  } else if(pAge > 65){
    const months = (pAge - 65) * 12;
    adjustment = 1 + months * 0.007; // 1ヶ月0.7%増
    adjLabel = `繰下げ${pAge-65}年（${Math.round((adjustment-1)*100)}%増額）`;
  }

  const kousei  = Math.round(kousei_base  * adjustment);
  const kokumin = Math.round(kokumin_base * adjustment);
  const total = kousei + kokumin;
  return {
    total, kousei, kokumin,
    kousei_base, kokumin_base,
    avgMonthlyGakumen: Math.round(avgMonthlyGakumen),
    kousei_months, kokumin_months,
    adjustment, adjLabel, pensionAge: pAge
  };
}

/* ── 縦線crosshairプラグイン（共通） ── */
const crosshairPlugin={
  id:'crosshair',
  afterDraw(chart){
    if(!chart.tooltip._active||!chart.tooltip._active.length)return;
    const x=chart.tooltip._active[0].element.x;
    const ctx=chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,chart.chartArea.top);
    ctx.lineTo(x,chart.chartArea.bottom);
    ctx.lineWidth=1.5;
    ctx.strokeStyle='rgba(120,120,120,0.5)';
    ctx.setLineDash([4,3]);
    ctx.stroke();
    ctx.restore();
  }
};

const INVEST_COLORS=['#1D9E75','#378ADD','#EF9F27','#A855F7','#EC4899','#F97316','#14B8A6','#6366F1'];
function InvestLineChart({proj,invest}){
  const ref=useRef(null);const chartRef=useRef(null);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  useEffect(()=>{
    if(!ref.current||typeof Chart==='undefined')return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
    const tc=isDark?'#64748b':'#94a3b8';
    const datasets=invest.map((inv,idx)=>({
      label:inv.name,
      data:proj.map(r=>{
        const snap=r.investSnapshot?.find(s=>s.id===inv.id);
        return snap?snap.cur:null;
      }),
      borderColor:INVEST_COLORS[idx%INVEST_COLORS.length],
      backgroundColor:INVEST_COLORS[idx%INVEST_COLORS.length]+'20',
      borderWidth:2,pointRadius:0,tension:.3,fill:false,spanGaps:true,
    }));
    /* 課税口座がある場合、税引後合計線を追加 */
    const hasTaxable=invest.some(i=>(i.taxType||'nisa')==='taxable');
    if(hasTaxable){
      datasets.push({
        label:'税引後合計（実質）',
        data:proj.map(r=>{
          const snaps=r.investSnapshot||[];
          const total=snaps.reduce((s,sn)=>s+sn.cur,0);
          const latentTax=snaps.reduce((s,sn)=>{
            if(sn.taxType!=='taxable')return s;
            /* 取得価格が0または未入力なら評価額そのままを使い、含み益はゼロとして扱う */
            const basis=sn.costBasis||sn.cur;
            const gain=Math.max(0,sn.cur-basis);
            return s+gain*0.20315;
          },0);
          return Math.round(total-latentTax);
        }),
        borderColor:'#EF9F27',
        backgroundColor:'transparent',
        borderWidth:2.5,borderDash:[6,3],
        pointRadius:0,tension:.3,fill:false,
      });
    }
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{labels:proj.map(r=>r.label),datasets},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:true,position:'bottom',
            labels:{color:tc,font:{size:11},boxWidth:12,padding:12}},
          tooltip:{position:'top',
            callbacks:{label:ctx=>ctx.raw==null?null:`${ctx.dataset.label}：${Math.round(ctx.raw).toLocaleString()}万円`},
            filter:item=>item.raw!=null}
        },
        scales:{
          x:{ticks:{color:tc,font:{size:10},maxTicksLimit:10},grid:{color:gc}},
          y:{ticks:{color:tc,font:{size:10},callback:v=>`${v}万`},grid:{color:gc}}
        },
        animation:{duration:300}}
    });
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[proj,invest]);
  return React.createElement('div',{style:{height:260,position:'relative'}},
    React.createElement('canvas',{ref,role:'img','aria-label':'金融資産別評価額推移グラフ'}));
}

/* ── UI helpers ── */
function NF({label,value,onChange,unit,min=0,max,step=1,note,readOnly}){
  const[local,setLocal]=useState(String(value));
  useEffect(()=>setLocal(String(value)),[value]);
  const clamp=n=>max!=null?Math.min(max,Math.max(min,n)):Math.max(min,n);
  const commit=v=>{
    const n=parseFloat(v);
    if(!isNaN(n)){const c=clamp(n);onChange(c);setLocal(String(c));}
    else setLocal(String(value));
  };
  const E=React.createElement;
  return E('div',{className:'nf'},
    E('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}},
      E('label',{style:{flex:1,marginBottom:0}},
        label,
        note&&E('span',{className:'nf-note',style:{marginLeft:4}},note)
      ),
      E('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},
        E('input',{type:'number',value:local,min,max,step,readOnly,
          className:readOnly?'ro':undefined,
          style:{textAlign:'right'},
          onChange:e=>setLocal(e.target.value),
          onFocus:e=>e.target.select(),
          onBlur:e=>commit(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter')commit(e.target.value);}}),
        unit&&E('span',{className:'un'},unit)
      )
    )
  );
}
/* インライン数値入力（blur確定方式） */
function InlineNum({value,onChange,min=0,max,step=1,style}){
  const[local,setLocal]=useState(String(value));
  useEffect(()=>setLocal(String(value)),[value]);
  const clamp=n=>max!=null?Math.min(max,Math.max(min,n)):Math.max(min,n);
  const commit=v=>{
    const n=parseFloat(v);
    if(!isNaN(n)){const c=clamp(n);onChange(c);setLocal(String(c));}
    else setLocal(String(value));
  };
  return React.createElement('input',{type:'number',value:local,min,max,step,
    onChange:e=>setLocal(e.target.value),
    onFocus:e=>e.target.select(),
    onBlur:e=>commit(e.target.value),
    onKeyDown:e=>{
      if(e.key==='Enter')commit(e.target.value);
      if(e.key==='ArrowUp'){e.preventDefault();const n=clamp(parseFloat(local||value)+step);onChange(n);setLocal(String(n));}
      if(e.key==='ArrowDown'){e.preventDefault();const n=clamp(parseFloat(local||value)-step);onChange(n);setLocal(String(n));}
    },
    style:{fontSize:16,...style}});
}

/* テキスト入力（blur確定方式） */
function InlineText({value,onChange,style}){
  const[local,setLocal]=useState(value);
  useEffect(()=>setLocal(value),[value]);
  return React.createElement('input',{type:'text',value:local,
    onChange:e=>setLocal(e.target.value),
    onFocus:e=>e.target.select(),
    onBlur:e=>onChange(e.target.value),
    onKeyDown:e=>e.key==='Enter'&&onChange(e.target.value),
    style:{fontSize:16,...style}});
}

/* null許容の数値入力（blur確定方式・text typeで連続入力対応） */
function InlineNumNullable({value,onChange,min,max,placeholder,style}){
  const[local,setLocal]=useState(value==null?'':String(value));
  useEffect(()=>setLocal(value==null?'':String(value)),[value]);
  const commit=v=>{
    const s=String(v).trim();
    if(s===''){onChange(null);return;}
    const n=parseInt(s,10);
    if(!isNaN(n))onChange(n);
    else setLocal(value==null?'':String(value));
  };
  return React.createElement('input',{
    type:'text',inputMode:'numeric',pattern:'[0-9]*',
    value:local,placeholder,
    onChange:e=>setLocal(e.target.value.replace(/[^0-9]/g,'')),
    onBlur:e=>commit(e.target.value),
    onKeyDown:e=>e.key==='Enter'&&commit(e.target.value),
    style:{fontSize:16,...style}});
}

function App(){
  const[d,setD]=useState(()=>{
    try{const s=localStorage.getItem(STORE);if(s){const p=JSON.parse(s);
      /* 旧incomeRanges→incomePointsへ変換 */
      const toPoints=ranges=>{
        if(!ranges||!ranges.length)return null;
        const pts=[];
        ranges.forEach(r=>{pts.push({id:r.id,age:r.fromAge,amount:r.amount});});
        return pts;
      };
      const myPoints=p.incomePoints||(p.incomeRanges?toPoints(p.incomeRanges):null)||DEF.incomePoints;
      const spPoints=p.spouseIncomePoints||(p.spouseIncomeRanges?toPoints(p.spouseIncomeRanges):null)||DEF.spouseIncomePoints;
      /* 子供のcostsを補完（旧データ対応） */
      const defaultCosts={};EDU_STAGES.forEach(s=>defaultCosts[s.id]=s.def);
      const repairedChildren=(p.children||DEF.children).map(c=>({
        ...c,
        costs:{...defaultCosts,...(c.costs||{})}
      }));
      /* 旧デフォルト値（120/60）は自動計算に戻す */

                  E('button',{onClick:()=>setRefModal('edu'),
                    style:{fontSize:10,padding:'2px 8px',borderRadius:5,border:'.5px solid var(--bdr2)',
                      background:'var(--bg)',color:'var(--txt2)',cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}
                  },'📖 根拠を見る')

              /* 年間費用：横一列テーブル */
              E('div',{style:{overflowX:'auto'}},
                E('table',{style:{width:'100%',borderCollapse:'collapse'}},
                  E('thead',null,
                    E('tr',null,
                      stages.map(s=>{
                        const ageA=s.id==='nursery'?(child.nurseryStart??0)
                          :s.id==='kindergarten'?(child.kindergartenStart??3)
                          :s.id==='graduate'?(child.graduateStart??22):s.ages[0];
                        const ageB=s.id==='nursery'?(child.nurseryEnd??3)
                          :s.id==='kindergarten'?(child.kindergartenEnd??6)
                          :s.id==='graduate'?(child.graduateEnd??24):s.ages[1];
                        const isEditable=s.id==='nursery'||s.id==='kindergarten'||s.id==='graduate';
                        const minAge=s.id==='nursery'?0:s.id==='kindergarten'?0:22;
                        const maxAge=s.id==='nursery'?6:s.id==='kindergarten'?6:27;
                        const startKey=s.id==='nursery'?'nurseryStart':s.id==='kindergarten'?'kindergartenStart':'graduateStart';
                        const endKey=s.id==='nursery'?'nurseryEnd':s.id==='kindergarten'?'kindergartenEnd':'graduateEnd';
                        const defStart=s.id==='nursery'?0:s.id==='kindergarten'?3:22;
                        const defEnd=s.id==='nursery'?3:s.id==='kindergarten'?6:24;
                        return E('th',{key:s.id,style:{
                          fontSize:10,fontWeight:600,color:'var(--txt3)',
                          padding:'0 6px 8px',textAlign:'center',
                          borderBottom:'.5px solid var(--bdr2)',whiteSpace:'nowrap'
                        }},
                          E('div',null,s.label),
                          isEditable
                            ? E('div',{style:{display:'flex',alignItems:'center',gap:2,justifyContent:'center',marginTop:3}},
                                E(InlineNumNullable,{value:ageA,min:minAge,max:maxAge,placeholder:String(defStart),
                                  onChange:v=>updC(child.id,startKey,v??defStart),
                                  style:{width:26,height:22,padding:'0 3px',borderRadius:5,
                                    border:'.5px solid var(--bdr2)',background:'var(--bg)',
                                    fontSize:10,color:'var(--txt)',textAlign:'center'}}),
                                E('span',{style:{fontSize:9,color:'var(--txt3)'}},'〜'),
                                E(InlineNumNullable,{value:ageB,min:minAge,max:maxAge,placeholder:String(defEnd),
                                  onChange:v=>updC(child.id,endKey,v??defEnd),
                                  style:{width:26,height:22,padding:'0 3px',borderRadius:5,
                                    border:'.5px solid var(--bdr2)',background:'var(--bg)',
                                    fontSize:10,color:'var(--txt)',textAlign:'center'}}),
                                E('span',{style:{fontSize:9,color:'var(--txt3)'}},'歳')
                              )
                            : E('div',{style:{fontSize:9,fontWeight:400,color:'var(--txt3)',marginTop:2}},
                                `${ageA}〜${ageB}歳`)
                        );
                      })
                    )
                  ),
                  E('tbody',null,
                    E('tr',null,
                      stages.map(s=>
                        E('td',{key:s.id,style:{padding:'8px 6px',textAlign:'center',verticalAlign:'middle'}},
                          E('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:2}},
                            E(InlineNum,{value:(child.costs||{})[s.id]??0,min:0,step:10,
                              onChange:v=>updCC(child.id,s.id,v),
                              style:{width:56,height:32,padding:'0 4px',borderRadius:7,
                                border:'.5px solid var(--bdr2)',background:'var(--bg2)',
                                fontSize:14,fontWeight:500,color:'var(--txt)',textAlign:'right'}}),
                            E('span',{style:{fontSize:10,color:'var(--txt3)'}}, '万')
                          )
                        )
                      )
                    )
                  )
                )
              ),
              /* 大学下宿費 */
              child.maxLevel!=='high'&&E('div',{style:{marginTop:12,paddingTop:12,borderTop:'.5px solid var(--bdr)'}},
                E('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
                  E('div',null,
                    E('span',{style:{fontSize:10,color:'var(--txt3)',fontWeight:600,
                      textTransform:'uppercase',letterSpacing:'.06em'}},'大学下宿費（月額）'),
                    E('span',{style:{fontSize:10,color:'var(--txt3)',marginLeft:8}},
                      child.maxLevel==='graduate'?'大学・大学院期間に適用':'大学期間（18〜22歳）に適用')
                  ),
                  E('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    E('div',{style:{display:'flex',alignItems:'center',gap:4}},
                      E(InlineNum,{value:child.univMonthly||0,min:0,max:50,step:0.5,

                          border:'.5px solid var(--bdr2)',background:'var(--bg)',
                          fontSize:14,color:'var(--txt)',textAlign:'right'}}),
                      E('span',{style:{fontSize:12,color:'var(--txt2)'}},'万円/月')

                    (child.univMonthly||0)>0&&E('span',{style:{fontSize:11,color:'var(--txt3)',

                (child.univMonthly||0)>0&&E('div',{style:{fontSize:10,color:'var(--txt3)',

                  `📌 大学4年間の下宿費合計：約${((child.univMonthly||0)*12*4).toFixed(0)}万円`,
                  child.maxLevel==='graduate'&&`　大学院期間追加：約${((child.univMonthly||0)*12*((child.graduateEnd??24)-(child.graduateStart??22))).toFixed(0)}万円`

                  E('div',{style:{fontSize:10,color:'var(--txt3)',fontWeight:600,
                    textTransform:'uppercase',letterSpacing:'.06em'}},'習い事（月額）'),
                  E('button',{
                    onClick:()=>updC(child.id,'activities',[...(child.activities||[]),
                      {id:Date.now(),name:'習い事',monthly:1,fromAge:3,toAge:12}]),
                    style:{fontSize:11,padding:'3px 10px',borderRadius:6,
                      border:'.5px solid var(--bdr2)',background:'transparent',
                      color:'var(--txt)',cursor:'pointer'}

                (child.activities||[]).length===0
                  ? E('div',{style:{fontSize:11,color:'var(--txt3)',padding:'6px 0'}},'登録されていません')
                  : E('table',{style:{width:'100%',borderCollapse:'collapse'}},
                      E('thead',null,E('tr',null,
                        E('th',{style:{fontSize:10,fontWeight:600,color:'var(--txt3)',padding:'0 6px 6px',textAlign:'left',borderBottom:'.5px solid var(--bdr2)'}},'名称'),
                        E('th',{style:{fontSize:10,fontWeight:600,color:'var(--txt3)',padding:'0 6px 6px',textAlign:'center',borderBottom:'.5px solid var(--bdr2)'}},'開始'),
                        E('th',{style:{fontSize:10,fontWeight:600,color:'var(--txt3)',padding:'0 6px 6px',textAlign:'center',borderBottom:'.5px solid var(--bdr2)'}},'終了'),
                        E('th',{style:{fontSize:10,fontWeight:600,color:'var(--txt3)',padding:'0 6px 6px',textAlign:'right',borderBottom:'.5px solid var(--bdr2)'}},'月額'),
                        E('th',{style:{borderBottom:'.5px solid var(--bdr2)'}})

                      E('tbody',null,(child.activities||[]).map((act,i)=>
                        E('tr',{key:act.id,style:{background:i%2===0?'transparent':'var(--bg2)'}},
                          E('td',{style:{padding:'5px 6px'}},
                            E(InlineText,{value:act.name,
                              onChange:v=>updC(child.id,'activities',(child.activities||[]).map(x=>x.id===act.id?{...x,name:v}:x)),
                              style:{width:'100%',height:28,padding:'0 7px',borderRadius:6,
                                border:'.5px solid var(--bdr2)',background:'var(--bg)',fontSize:12,color:'var(--txt)'}})
                          ),
                          E('td',{style:{padding:'5px 4px'}},
                            E('div',{style:{display:'flex',alignItems:'center',gap:2}},
                              E(InlineNumNullable,{value:act.fromAge??0,min:0,max:30,placeholder:'0',
                                onChange:v=>updC(child.id,'activities',(child.activities||[]).map(x=>x.id===act.id?{...x,fromAge:v??0}:x)),
                                style:{width:32,height:28,padding:'0 4px',borderRadius:6,
                                  border:'.5px solid var(--bdr2)',background:'var(--bg)',fontSize:12,color:'var(--txt)',textAlign:'center'}}),
                              E('span',{style:{fontSize:10,color:'var(--txt3)'}},'歳')
                            )
                          ),
                          E('td',{style:{padding:'5px 4px'}},
                            E('div',{style:{display:'flex',alignItems:'center',gap:2}},
                              E(InlineNumNullable,{value:act.toAge??18,min:0,max:30,placeholder:'18',
                                onChange:v=>updC(child.id,'activities',(child.activities||[]).map(x=>x.id===act.id?{...x,toAge:v??18}:x)),
                                style:{width:32,height:28,padding:'0 4px',borderRadius:6,
                                  border:'.5px solid var(--bdr2)',background:'var(--bg)',fontSize:12,color:'var(--txt)',textAlign:'center'}}),
                              E('span',{style:{fontSize:10,color:'var(--txt3)'}},'歳')
                            )
                          ),
                          E('td',{style:{padding:'5px 4px'}},
                            E('div',{style:{display:'flex',alignItems:'center',gap:3,justifyContent:'flex-end'}},
                              E(InlineNum,{value:act.monthly||0,min:0,step:0.5,
                                onChange:v=>updC(child.id,'activities',(child.activities||[]).map(x=>x.id===act.id?{...x,monthly:v}:x)),
                                style:{width:52,height:28,padding:'0 6px',borderRadius:6,
                                  border:'.5px solid var(--bdr2)',background:'var(--bg)',fontSize:12,color:'var(--txt)',textAlign:'right'}}),
                              E('span',{style:{fontSize:10,color:'var(--txt3)'}},'万円')
                            )
                          ),
                          E('td',{style:{padding:'5px 4px',textAlign:'center'}},
                            E('button',{
                              onClick:()=>updC(child.id,'activities',(child.activities||[]).filter(x=>x.id!==act.id)),
                              style:{border:'none',background:'transparent',color:'var(--ng-txt)',fontSize:14,cursor:'pointer',padding:'0 3px'}
                            },'×')
                          )
                        )
                      ))
                    )
              ),
              /* 入学費用 */
              (child.maxLevel==='university'||child.maxLevel==='graduate')&&E('div',{
                style:{marginTop:12,paddingTop:12,borderTop:'.5px solid var(--bdr)'}},
                E('div',{style:{fontSize:10,color:'var(--txt3)',marginBottom:8,fontWeight:600,
                  textTransform:'uppercase',letterSpacing:'.06em'}},'入学費用（一時費用）'),
                E('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
                  E('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    E('span',{style:{fontSize:11,color:'var(--txt2)',whiteSpace:'nowrap'}},'大学入学（18歳）'),
                    E(InlineNum,{value:child.universityEntrance||0,min:0,step:10,
                      onChange:v=>updC(child.id,'universityEntrance',v),
                      style:{width:64,height:30,padding:'0 8px',borderRadius:7,
                        border:'.5px solid var(--bdr2)',background:'var(--bg2)',
                        fontSize:13,fontWeight:500,color:'var(--txt)',textAlign:'right'}}),
                    E('span',{style:{fontSize:10,color:'var(--txt3)'}},'万円')
                  ),
                  child.maxLevel==='graduate'&&E('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    E('span',{style:{fontSize:11,color:'var(--txt2)',whiteSpace:'nowrap'}},
                      `大学院入学（${child.graduateStart??22}歳）`),
                    E(InlineNum,{value:child.graduateEntrance||0,min:0,step:10,
                      onChange:v=>updC(child.id,'graduateEntrance',v),
                      style:{width:64,height:30,padding:'0 8px',borderRadius:7,
                        border:'.5px solid var(--bdr2)',background:'var(--bg2)',
                        fontSize:13,fontWeight:500,color:'var(--txt)',textAlign:'right'}}),
                    E('span',{style:{fontSize:10,color:'var(--txt3)'}},'万円')
                  )
                )
              )
            );
          })
        )
      ),

      /* ── 実績入力 ── */

      /* ── 使い方ガイド ── */
      tab==='guide'&&E('div',{className:'fade'},
        E('div',{style:{maxWidth:640,margin:'0 auto'}},

          /* ヒーロー */
          E('div',{style:{textAlign:'center',padding:'32px 0 24px'}},
            E('div',{style:{fontSize:40,marginBottom:12}},'🏡'),
            E('div',{style:{fontSize:22,fontWeight:700,color:'var(--txt)',letterSpacing:'-.02em',marginBottom:8}},
              '家族の資産プランナー'),
            E('div',{style:{fontSize:14,color:'var(--txt2)',lineHeight:1.7}},
              '年収・支出・住宅・投資・教育費を入力するだけで',E('br',null),
              '老後までの資産推移を自動でシミュレーションします。')
          ),

          /* STEP一覧 */
          ...[
            {
              step:'STEP 1',icon:'👤',tab:'basic',color:'#3B82F6',
              title:'基本情報を入力する',
              desc:'年齢・年収・生活費・年金を入力します。特に年収は額面で入力するだけで手取りを自動計算。老後の年金受給額も退職年齢から自動で概算します。',
              points:['年収は現在の額面を入力 → 手取りを自動計算','生活費はかんたん設定（節約〜充実）で一括設定','育休・パート転換などライフイベントも追加できます']
            },
            {
              step:'STEP 2',icon:'🏠',tab:'housing',color:'#10B981',
              title:'住宅プランを入力する（任意）',
              desc:'マイホームを検討中の方は住宅タブで物件価格・頭金・金利を入力します。月々の返済額と収入比率が自動計算され、無理のない購入額の目安がわかります。',
              points:['物件価格・頭金・金利を入力するだけ','購入前の家賃も入力できます','収入比率で「無理のある返済」を診断']
            },
            {
              step:'STEP 3',icon:'💰',tab:'invest',color:'#F59E0B',
              title:'金融資産・投資を入力する（任意）',
              desc:'現在の貯蓄・NISA・iDeCoなど投資口座を登録します。利回りと積立額を設定すれば、将来の資産評価額が自動でグラフに反映されます。',
              points:['現金・預貯金の残高を入力','NISA・課税口座を分けて管理','積立額と利回りで資産の伸びをシミュレーション']
            },
            {
              step:'STEP 4',icon:'🎓',tab:'education',color:'#8B5CF6',
              title:'教育費を設定する（任意）',
              desc:'お子さんの進路ごとに公立・私立を選ぶだけで、文科省データをもとにした教育費が自動反映されます。幼稚園から大学院まで対応。',
              points:['幼〜大学まで公立・私立を選択するだけ','文科省R5年度データ（施設利用料込み）を使用','子どもが複数いても対応']
            },
            {
              step:'STEP 5',icon:'📊',tab:'dashboard',color:'#EF4444',
              title:'ダッシュボードで結果を確認する',
              desc:'入力した情報をもとに、現在から80歳までの総資産推移をグラフで確認できます。住宅ローン・老後資産・月間収支を3段階で診断します。',
              points:['総資産グラフで老後の見通しを確認','住宅・老後・収支を🟢🟡🔴で診断','プランA/B/Cを作って比較も可能']
            },
          ].map((s,i)=>
            E('div',{key:i,style:{
              background:'var(--bg)',border:'.5px solid var(--bdr)',
              borderRadius:14,padding:'20px',marginBottom:12,
            }},
              E('div',{style:{display:'flex',alignItems:'flex-start',gap:14}},
                E('div',{style:{
                  width:44,height:44,borderRadius:12,flexShrink:0,
                  background:s.color+'18',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:22
                }},s.icon),
                E('div',{style:{flex:1,minWidth:0}},
                  E('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
                    E('span',{style:{
                      fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,
                      background:s.color+'18',color:s.color
                    }},s.step),
                    E('span',{style:{fontSize:15,fontWeight:700,color:'var(--txt)'}},s.title)
                  ),
                  E('p',{style:{fontSize:13,color:'var(--txt2)',lineHeight:1.7,marginBottom:10}},s.desc),
                  E('div',{style:{display:'flex',flexDirection:'column',gap:4}},
                    s.points.map((pt,j)=>
                      E('div',{key:j,style:{display:'flex',alignItems:'flex-start',gap:6,fontSize:12,color:'var(--txt2)'}},
                        E('span',{style:{color:s.color,flexShrink:0,marginTop:1}},'✓'),
                        E('span',null,pt)
                      )
                    )
                  ),
                  E('button',{
                    onClick:()=>switchTab(s.tab),
                    style:{
                      marginTop:12,height:34,padding:'0 16px',borderRadius:8,
                      border:`1.5px solid ${s.color}`,
                      background:s.color+'12',color:s.color,
                      fontSize:12,fontWeight:600,cursor:'pointer',
                    }
                  },`${s.icon} ${s.tab==='dashboard'?'ダッシュボードを見る':'入力しに行く'} →`)
                )
              )
            )
          ),

          /* よくある質問 */
          E('div',{style:{marginTop:24}},
            E('div',{style:{fontSize:13,fontWeight:700,color:'var(--txt)',marginBottom:12,paddingBottom:8,borderBottom:'.5px solid var(--bdr)'}},'💬 よくある質問'),
            ...[
              ['データはどこに保存されますか？','お使いのブラウザのみに保存されます。サーバーへの送信は一切ありません。「⋯」メニューからJSONファイルとして書き出し・読み込みもできます。'],
              ['複数のシナリオを比較できますか？','プランバーの「＋」ボタンから複数プランを作成し、「比較」ボタンで総資産推移を並べて比較できます。'],
              ['年金の計算は正確ですか？','厚労省・日本年金機構の公式計算式をもとにした概算です。繰上げ・繰下げ受給も反映されます。正確な受給額はねんきん定期便でご確認ください。'],
              ['住宅を買わない場合は？','住宅タブの数値はそのままにしておき、ダッシュボードのグラフで「ローンなし」の結果を確認できます。住宅欄を空にする設定は現状未対応です。'],
            ].map(([q,a],i)=>
              E('div',{key:i,style:{marginBottom:12,padding:'14px 16px',background:'var(--bg)',border:'.5px solid var(--bdr)',borderRadius:10}},
                E('div',{style:{fontSize:13,fontWeight:600,color:'var(--txt)',marginBottom:6}},`Q. ${q}`),
                E('div',{style:{fontSize:12,color:'var(--txt2)',lineHeight:1.7}},a)
              )
            )
          ),

          /* フッター */
          E('div',{style:{textAlign:'center',padding:'24px 0 32px',color:'var(--txt3)',fontSize:11,lineHeight:1.8}},
            'データはご自身のデバイスのみに保存されます。',E('br',null),
            '計算はすべてブラウザ内で完結しており、外部サーバーへの送信はありません。'
          )
        )
      ),
    )
    ) /* app-content */
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
